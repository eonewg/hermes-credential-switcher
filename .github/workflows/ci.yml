name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Hermes agent (loader integration)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NousResearch/hermes-agent
          ref: 861d69c7bba8d2ea6a1cd170e989c901c74d32d1
          path: .ci/hermes-agent

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade "pip"
          python -m pip install -e ".[dev]"

      - name: Compile checks
        run: python -m compileall -q hermes_credential_switcher tests __init__.py

      - name: Pytest (incl. real loader with HERMES_AGENT_SOURCE)
        env:
          HERMES_AGENT_SOURCE: ${{ github.workspace }}/.ci/hermes-agent
        run: pytest

      - name: Secret / path scan (fixtures only; refuse real home paths)
        run: |
          python scripts/secret_path_scan.py

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade "pip" "build"
          python -m pip install "setuptools>=77,<83" wheel
          python -m build
      - name: Check entry point metadata
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from importlib.metadata import entry_points
          eps = entry_points()
          group = eps.select(group="hermes_agent.plugins") if hasattr(eps, "select") else eps.get("hermes_agent.plugins", [])
          names = {ep.name for ep in group}
          assert "hermes-credential-switcher" in names, names
          print("entry point ok:", names)
          PY
